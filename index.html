<html>
<head>
    <meta charset="utf-8">
    <title>我的测试站点</title>
</head>
<body bgcolor="orange">
    <h1>calculate your bmi</h1>
    <p>这个网页就是为了计算你的bmi，看你到底胖不胖</p>
    <a href="https://baike.baidu.com/item/%E8%BA%AB%E4%BD%93%E8%B4%A8%E9%87%8F%E6%8C%87%E6%95%B0/8706438?fromtitle=BMI&fromid=6742785">点我，看什么是bmi。</a>
    <br>
    你的体重:<br>
    <input id="x" type="number" name="weight">
    <br>
    你的身高:<br>
    <input id="y" type="number" name="height">
    <script>
    function f()
    {
    var weight = parseFloat(document.getElementById("x").value);
    var height = parseFloat(document.getElementById("y").value);
    var y = weight /( height*height);

        document.getElementById("demo").innerHTML = "你的bmi是"+ y;
    }
   </script>

    <script src="myjs.js"></script>
    <button type=button onclick="f()">测试输入</button>
</html>
